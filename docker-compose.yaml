# NovaMind AI — docker-compose.yaml — Phase 2
# Orchestrates all four services in an isolated virtual network.
# Run: docker-compose up --build
# Stop: docker-compose down

services:

  # ─── MongoDB ──────────────────────────────────────────────────────────────────
  # Primary database. Data persists across container restarts via a named volume.
  novamind-mongo:
    image: mongo:7.0
    container_name: novamind-mongo
    restart: always
    ports:
      - "27017:27017"     # Expose port for GUI tools (MongoDB Compass, etc.)
    volumes:
      - mongo-data:/data/db
    networks:
      - novamind-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ────────────────────────────────────────────────────────────────────
  # In-memory store. Used in Phase 4 by BullMQ for background job queues.
  novamind-redis:
    image: redis:7-alpine
    container_name: novamind-redis
    restart: always
    ports:
      - "6379:6379"       # Expose port for debugging via redis-cli
    volumes:
      - redis-data:/data
    networks:
      - novamind-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend (Express API) ────────────────────────────────────────────────────
  # Builds from backend/Dockerfile. All sensitive secrets are injected at runtime
  # via the env_file directive so they are never baked into the Docker image.
  novamind-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: novamind-backend
    restart: always
    env_file:
      - ./backend/.env          # Contains all API keys & secrets
    environment:
      - NODE_ENV=production
      - PORT=5000
      # Override localhost URIs from .env with Docker service names
      - MONGODB_URI=mongodb://novamind-mongo:27017/novamind
      - REDIS_URL=redis://novamind-redis:6379
      # In Docker, the frontend is served by Nginx on port 80
      - ALLOWED_ORIGIN=http://localhost
    depends_on:
      novamind-mongo:
        condition: service_healthy
      novamind-redis:
        condition: service_healthy
    ports:
      - "5000:5000"       # Exposed for direct debugging; traffic normally flows via Nginx
    networks:
      - novamind-network

  # ─── Frontend (React + Nginx) ─────────────────────────────────────────────────
  # Builds static assets, then serves them via Nginx.
  # Nginx also reverse-proxies /api/* to novamind-backend:5000.
  novamind-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: novamind-frontend
    restart: always
    ports:
      - "80:80"           # Primary entry point — access the app at http://localhost
    depends_on:
      - novamind-backend
    networks:
      - novamind-network

# ─── Named Volumes ────────────────────────────────────────────────────────────
# Data persists across `docker-compose down` restarts.
# To wipe all data: docker-compose down -v
volumes:
  mongo-data:
  redis-data:

# ─── Network ──────────────────────────────────────────────────────────────────
# Services communicate by container name on this private bridge network.
# Only explicitly mapped ports are accessible from the host machine.
networks:
  novamind-network:
    driver: bridge
