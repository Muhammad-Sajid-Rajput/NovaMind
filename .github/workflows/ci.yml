name: NovaMind CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  # ─── Job 1: Lint & Test ───────────────────────────────────────────────────────
  # Runs on every push/PR. Validates code quality before any Docker work.
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          # Cache both package-lock.json files independently
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      # ── Frontend checks ────────────────────────────────────────────────────
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint --if-present

      - name: Run frontend tests
        working-directory: frontend
        run: npm test --if-present

      # ── Backend checks ─────────────────────────────────────────────────────
      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Lint backend
        working-directory: backend
        run: npm run lint --if-present

      - name: Run backend tests
        working-directory: backend
        run: npm test --if-present

  # ─── Job 2: Docker Build Validation ──────────────────────────────────────────
  # Only runs after lint-and-test passes. Verifies both Dockerfiles build cleanly.
  # Does NOT push to any registry — this is a build sanity check only.
  docker-build-check:
    name: Verify Docker Builds
    needs: lint-and-test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Verify backend Dockerfile builds
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          tags: novamind-backend:ci-test
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Verify frontend Dockerfile builds
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false
          tags: novamind-frontend:ci-test
          cache-from: type=gha
          cache-to:   type=gha,mode=max
