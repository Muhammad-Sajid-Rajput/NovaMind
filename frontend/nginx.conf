server {
    listen 80;
    server_name localhost;

    # ─── Gzip Compression ──────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied    expired no-cache no-store private auth;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    root  /usr/share/nginx/html;
    index index.html;

    # ─── SPA Static File Serving ────────────────────────────────────────────────
    # All unknown paths fall back to index.html so React Router handles routing.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ─── API Reverse Proxy (General) ────────────────────────────────────────────
    # All /api/* requests are forwarded to the backend container on port 5000.
    # This means the browser only ever talks to one origin (port 80),
    # which eliminates CORS issues in production.
    location /api/ {
        proxy_pass         http://novamind-backend:5000;
        proxy_http_version 1.1;

        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host       $host;
        proxy_set_header X-Real-IP  $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_cache_bypass $http_upgrade;
    }

    # ─── SSE Streaming Proxy (NovaMind Chat Stream) ──────────────────────────────
    # CRITICAL: Nginx buffers responses by default. This causes SSE/streaming
    # responses to be held in Nginx's memory and sent to the browser in one large
    # batch AFTER the stream ends — completely breaking the real-time typing effect.
    #
    # This dedicated location block disables all buffering and caching for the
    # chat stream endpoint, ensuring each token is delivered to the browser instantly.
    location /api/chat/stream {
        proxy_pass         http://novamind-backend:5000;
        proxy_http_version 1.1;

        proxy_set_header Connection "";
        proxy_set_header Host       $host;
        proxy_set_header X-Real-IP  $remote_addr;

        # Disable response buffering — tokens flow to browser immediately
        proxy_buffering            off;
        proxy_cache                off;

        # Use chunked transfer for streaming compatibility
        chunked_transfer_encoding  on;

        # Keep the SSE connection alive for long AI responses
        proxy_read_timeout  86400s;
        proxy_send_timeout  86400s;
        keepalive_timeout   86400s;
    }
}
